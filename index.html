<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Live | 2026 Federal Election</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <p class="breadcrumb">AEC Live | Federal Election 2026 | Results</p>
            <h1>2026 Federal Election Results</h1>
        </header>

        <nav class="tab-nav">
            <button id="btn-tally" class="tab-btn active">Tally Room</button>
            <button id="btn-map" class="tab-btn">Electoral Map</button>
        </nav>

        <div id="view-tally">
            <div id="election-winner" class="winner-box">Loading...</div>
            
            <section class="main-tally">
                <div class="status-bar">
                    <span>100% counted</span>
                    <span>17 to win</span>
                </div>
                <div class="bar-wrapper">
                    <div class="party-row">
                        <div class="party-label">ALP</div>
                        <div class="bar-container"><div class="bar alp" id="alp-bar"><span class="count" id="alp-count">0</span></div></div>
                    </div>
                    <div class="party-row">
                        <div class="party-label">LNP</div>
                        <div class="bar-container"><div class="bar lnp" id="lnp-bar"><span class="count" id="lnp-count">0</span></div></div>
                    </div>
                    <div class="party-row">
                        <div class="party-label">ONP</div>
                        <div class="bar-container"><div class="bar onp" id="onp-bar"><span class="count" id="onp-count">0</span></div></div>
                    </div>
                </div>
            </section>

            <div id="seat-list"></div>
        </div>

        <div id="view-map" style="display: none;">
            <div class="map-container">
                <img src="https://raw.githubusercontent.com/electoral-commision/election/main/qld-1.svg" alt="Election Map" class="static-map">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
