<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Federal Election 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <p class="breadcrumb">AEC Live | Federal Election 2026</p>
            <div class="tab-container">
                <button class="tab-btn active" id="tab-house">House</button>
                <button class="tab-btn" id="tab-map">House Map</button>
                <button class="tab-btn" id="tab-senate">Senate</button>
            </div>
            <h1 id="view-title">2026 Federal Election Results</h1>
            <p class="update-time" id="time-display">Loading...</p>
        </header>

        <div class="controls-wrapper">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="seat-search" placeholder="Search electorate or candidate name">
            </div>
            
            <div class="filter-sort-container">
                <div class="filter-group">
                    <span class="ctrl-label">Filters</span>
                    <button class="chip" id="btn-doubt">Seats in Doubt</button>
                    <button class="chip" id="btn-changing">Changing Seats</button>
                    <div class="chip select-wrapper">Won by <span class="arrow">▾</span></div>
                    <div class="chip select-wrapper">Held by <span class="arrow">▾</span></div>
                </div>
                <div class="sort-group">
                    <span class="ctrl-label">Sort</span>
                    <button class="chip-sm">A-Z</button>
                    <button class="chip-sm active">Latest</button>
                    <button class="chip-sm">Margin</button>
                </div>
            </div>
        </div>

        <div id="house-view">
            <div id="election-winner"></div>
            <section class="main-tally">
                <div class="status-bar">
                    <span id="percent-counted">100% counted</span>
                    <span class="goal">8 to win</span>
                </div>
                <div class="bar-wrapper">
                    <div class="majority-marker"></div>
                    <div class="party-row">
                        <div class="party-label">ALP</div>
                        <div class="bar-container"><div class="bar alp" id="alp-bar"><span class="count" id="alp-count">0</span></div></div>
                    </div>
                    <div class="party-row">
                        <div class="party-label">LNP</div>
                        <div class="bar-container"><div class="bar lnp" id="lnp-bar"><span class="count" id="lnp-count">0</span></div></div>
                    </div>
                    <div class="party-row">
                        <div class="party-label">ONP</div>
                        <div class="bar-container"><div class="bar onp" id="onp-bar"><span class="count" id="onp-count">0</span></div></div>
                    </div>
                </div>
            </section>
        </div>

        <div id="map-view" style="display: none;">
            <div class="map-grid" id="map-grid"></div>
        </div>

        <div id="senate-view" style="display: none;">
            <div class="horseshoe-box">
                <svg id="senate-svg" viewBox="0 0 400 200"></svg>
                <div id="senate-legend" class="legend"></div>
            </div>
        </div>

        <section class="seat-list-container">
            <div id="seat-list"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
