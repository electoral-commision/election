<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Live | Federal Election 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aec-container">
        <header class="aec-header">
            <p class="analyst-tag">By chief elections and data analyst <strong>Casey Briggs</strong></p>
            <h1>2026 Federal Election Results</h1>
            <p id="time-display" class="status-timestamp">Updated Thu at 5:30pm</p>
        </header>

        <div id="election-winner" class="coalition-banner"></div>

        <div class="aec-tabs">
            <button id="btn-house" class="tab-btn active" onclick="switchView('house')">House of Reps</button>
            <button id="btn-senate" class="tab-btn" onclick="switchView('senate')">The Senate</button>
        </div>

        <section id="house-view" class="tally-card">
            <div class="tally-meta">
                <span id="percent-counted">100.0% counted</span>
                <span class="goal">8 to win</span>
            </div>
            <div class="progress-container">
                <div class="majority-line"></div>
                <div class="party-progress-row">
                    <span class="party-id">ALP</span>
                    <div class="progress-bg"><div id="alp-bar" class="progress-fill alp"></div></div>
                    <span id="alp-count" class="party-total">0</span>
                </div>
                <div class="party-progress-row">
                    <span class="party-id">LNP</span>
                    <div class="progress-bg"><div id="lnp-bar" class="progress-fill lnp"></div></div>
                    <span id="lnp-count" class="party-total">0</span>
                </div>
                <div class="party-progress-row">
                    <span class="party-id">ONP</span>
                    <div class="progress-bg"><div id="onp-bar" class="progress-fill onp"></div></div>
                    <span id="onp-count" class="party-total">0</span>
                </div>
            </div>
        </section>

        <section id="senate-view" class="senate-viz-card" style="display: none;">
            <svg viewBox="0 0 200 130" class="senate-svg">
                <g id="senate-dots"></g>
                <text x="100" y="90" class="senate-num">6</text>
                <text x="100" y="110" class="senate-sub">Senate Composition</text>
            </svg>
        </section>

        <section id="seat-list" class="seat-grid"></section>
    </div>
    <script src="script.js"></script>
</body>
</html>
