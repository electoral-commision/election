<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QLD Live Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <p class="breadcrumb">QLD Election 2026 | Full Results ></p>
        <h1>Queensland Results</h1>
        <p class="update-time">32 of 32 districts | Updated April 2026</p>

        <div class="bar-wrapper">
            <div class="required-text">17 required for majority</div>
            <div class="majority-marker"></div>
            <div id="bar-rows-container"></div>
        </div>

        <nav class="tab-nav">
            <button class="tab-btn active" id="btn-tally">Tally Room</button>
            <button class="tab-btn" id="btn-map">Electoral Map</button>
        </nav>

        <div id="tally-view">
            <div id="seat-list"></div>
        </div>

        <div id="map-view" style="display:none;">
            <div class="map-legend" id="map-legend"></div>
            <img src="https://cdn.discordapp.com/attachments/1035879662921986079/1492058642944364655/m94btm1.png?ex=69d9f365&is=69d8a1e5&hm=1ecf685424858bbc707e1a92d0f60780967eb0054818f5b54e379b71b92b9f3f&" class="map-img" alt="Map">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
