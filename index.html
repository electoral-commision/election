<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Federal Election 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <p class="breadcrumb">AEC Live | Federal Election 2026</p>
            <h1>2026 Federal Election Results</h1>
            <p id="time-display" class="update-time">Loading AEC Data...</p>
        </header>

        <div id="election-winner" class="winner-banner"></div>

        <div class="view-switcher">
            <button id="btn-house" class="view-btn active" onclick="switchView('house')">House of Reps</button>
            <button id="btn-senate" class="view-btn" onclick="switchView('senate')">The Senate</button>
        </div>

        <section id="house-view" class="main-tally">
            <div class="status-bar">
                <span id="percent-counted">100.0% counted</span>
                <span class="goal">8 to win</span>
            </div>
            <div class="bar-wrapper">
                <div class="majority-marker"></div>
                <div class="party-row">
                    <div class="party-label">ALP</div>
                    <div class="bar-container"><div class="bar alp" id="alp-bar"><span class="count" id="alp-count">0</span></div></div>
                </div>
                <div class="party-row">
                    <div class="party-label">LNP</div>
                    <div class="bar-container"><div class="bar lnp" id="lnp-bar"><span class="count" id="lnp-count">0</span></div></div>
                </div>
                <div class="party-row">
                    <div class="party-label">ONP</div>
                    <div class="bar-container"><div class="bar onp" id="onp-bar"><span class="count" id="onp-count">0</span></div></div>
                </div>
            </div>
        </section>

        <section id="senate-view" class="senate-viz-container" style="display: none;">
            <svg class="senate-svg" viewBox="0 0 200 130">
                <g id="senate-dots"></g>
                <text x="100" y="90" class="senate-total-text">6</text>
                <text x="100" y="110" class="senate-label-small">Senate Composition</text>
            </svg>
            <div class="senate-legend">
                <span><span style="color:#e61e2b">●</span> ALP: 3</span>
                <span><span style="color:#005696">●</span> LNP: 1</span>
                <span><span style="color:#f7941d">●</span> ONP: 2</span>
            </div>
        </section>

        <section class="seat-by-seat">
            <div id="seat-list"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
