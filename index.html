<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Federal Election 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <p class="breadcrumb">AEC Live | Federal Election 2026</p>
            <div class="tab-container">
                <button class="tab-btn active" id="tab-house">House</button>
                <button class="tab-btn" id="tab-house-map">House Map</button>
                <button class="tab-btn" id="tab-senate">Senate</button>
            </div>
            <h1 id="view-title">2026 Federal Election Results</h1>
            <p class="update-time" id="time-display">Fetching last edit...</p>
        </header>

        <div class="controls-wrapper">
            <div class="search-container">
                <input type="text" id="seat-search" placeholder="Search electorate or candidate name">
                <span class="search-icon">🔍</span>
            </div>
            <div class="filter-sort-row">
                <div class="filter-group">
                    <span class="label">Filters</span>
                    <button class="chip" id="filter-doubt">Seats in Doubt</button>
                    <button class="chip" id="filter-changing">Changing Seats</button>
                    <select class="chip-select"><option>Won by</option></select>
                    <select class="chip-select"><option>Held by</option></select>
                </div>
                <div class="sort-group">
                    <span class="label">Sort</span>
                    <button class="chip-mini">A-Z</button>
                    <button class="chip-mini active">Latest</button>
                    <button class="chip-mini">Margin</button>
                </div>
            </div>
        </div>

        <div id="tally-section">
            <div id="election-winner"></div>
            </div>

        <div id="map-view" style="display: none;">
            <div class="map-grid" id="map-grid"></div>
        </div>

        <div id="senate-view" style="display: none;">
            <div class="horseshoe-box">
                <svg id="senate-svg" viewBox="0 0 400 200"></svg>
                <div id="senate-legend" class="legend"></div>
            </div>
        </div>

        <section class="seat-list-container" id="list-view">
            <div id="seat-list"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
